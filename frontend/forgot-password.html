<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>exsender · Сброс пароля</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/mobile.css?v=20260528mob" />
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="logo-mark">e</span>
        <div>
          <h1 class="login-title">Сброс пароля</h1>
          <p class="login-sub">Подтверждение через Telegram</p>
        </div>
      </div>

      <div id="fpStepEmail">
        <form id="fpEmailForm" class="login-form">
          <div class="field">
            <label class="field-label" for="fpEmail">Email аккаунта</label>
            <input class="input" id="fpEmail" type="email" required autocomplete="email" />
          </div>
          <p class="login-error" id="fpError" hidden></p>
          <p class="login-foot" id="fpHint">Работает только для аккаунтов с привязанным Telegram при регистрации.</p>
          <button type="submit" class="btn-primary login-submit" id="fpEmailBtn">Получить ссылку в Telegram</button>
          <p class="login-foot"><a href="/login">← Вернуться ко входу</a></p>
        </form>
      </div>

      <div id="fpStepBot" hidden>
        <p class="login-sub" style="margin-bottom:16px;">Открой бота и подтверди сброс. Затем вернись сюда.</p>
        <a class="btn-primary login-submit" id="fpBotLink" href="#" target="_blank" rel="noopener">Открыть Telegram</a>
        <p class="login-foot" id="fpBotStatus">Ожидание подтверждения…</p>
      </div>

      <div id="fpStepPass" hidden>
        <form id="fpPassForm" class="login-form">
          <div class="field">
            <label class="field-label" for="fpPassword">Новый пароль</label>
            <input class="input" id="fpPassword" type="password" required minlength="8" autocomplete="new-password" />
          </div>
          <div class="field">
            <label class="field-label" for="fpPassword2">Повтор пароля</label>
            <input class="input" id="fpPassword2" type="password" required minlength="8" autocomplete="new-password" />
          </div>
          <p class="login-error" id="fpPassError" hidden></p>
          <button type="submit" class="btn-primary login-submit">Сохранить пароль</button>
        </form>
      </div>
    </div>
  </div>
  <script src="js/http.js" defer></script>
  <script src="js/forgot-password.js" defer></script>
</body>
</html>
